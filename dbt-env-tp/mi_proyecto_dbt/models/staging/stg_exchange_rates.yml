version: 2

models:
  - name: stg_tipo_cambio
    description: "Limpieza y desagruacion del JSON de tipo de cambio"
    tests:
      # dbt-expectations: Valida que la tabla no esté vacía
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1
          severity: warn
    columns:
      - name: fecha_cotizacion
        tests:
          - not_null
      - name: moneda_destino
        tests:
          - unique
          - not_null
      - name: tipo_cambio
        tests:
          - not_null
          # dbt-expectations: El tipo de cambio debe ser mayor a cero
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0